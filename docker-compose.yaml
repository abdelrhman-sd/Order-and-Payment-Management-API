services:
  app:
    build:
      context: .
      target: ${APP_ENV:-development}
    container_name: ${APP_NAME:-laravel_app}
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      #- ./php/php.ini:/usr/local/etc/php/conf.d/app.ini
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assignment_network

  db:
    image: mysql:8.0
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-payment_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assignment_network

  redis:
    image: redis:7-alpine
    container_name: cache
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assignment_network

volumes:
  db_data:
  redis_data:

networks:
  assignment_network:
